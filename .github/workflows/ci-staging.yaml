name: ci-staging
on:
  pull_request:
    branches:
      - "release/"
jobs:
  ci-staging-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{github.ref}}
      - name: Lint HTML and CSS Code 
        run: |
          npx htmlhint "/*.html"
          npx stylelint "/*.css"
      - name: Build Artifact 
        run: |
          npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"