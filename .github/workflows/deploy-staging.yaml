name: Deployment for Staging environment
on:
  push:
    branches:
      - "release/v1.0.0"
jobs:
    build_job:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: build using parcel
              run: |
                npx parcel build "./src/index.html" --dist-dir "./dist" --public-url "./"
            - name: Saving Artifact on Cloud
              uses: actions/upload-pages-artifact@v3
              with:
                  path: "./dist"
                  name: "staging-artifact"
    
    deploy_job:
        needs: build_job
        permissions:
            pages: write
            id-token: write
        environment: "staging-env"
        runs-on: ubuntu-latest
        steps:
            - name: deploy the build artifacts on github pages
              uses: actions/deploy-pages@v4
              with:
                  artifact_name: "staging-artifact"
                  token: ${{ secrets.GITHUB_TOKEN }}